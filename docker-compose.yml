# Docker Compose for local development and self-hosted deployment.
#
#   1. cp .env.example .env
#   2. edit .env: set a strong JWT_SECRET and POSTGRES_PASSWORD
#   3. docker compose up --build
#
# Secrets (JWT_SECRET, POSTGRES_PASSWORD) are injected from your .env file via
# ${VAR:?...} substitution and are intentionally NOT given defaults here, so the
# stack fails fast with a clear message rather than silently running on a
# well-known placeholder. Non-secret settings keep sensible inline defaults.
#
# The app waits for Postgres to be healthy, runs migrations on startup, and
# (when REDIS_URL is set) connects to Redis for multi-instance event fan-out.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rsmc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-rsmc}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rsmc} -d ${POSTGRES_DB:-rsmc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # DB URL is composed from the same credentials used by the postgres
      # service so they can never drift apart.
      DATABASE_URL: postgres://${POSTGRES_USER:-rsmc}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-rsmc}
      REDIS_URL: redis://redis:6379
      # REQUIRED: no default on purpose — set a long random value in .env
      # (e.g. `openssl rand -hex 32`). Compose aborts if it is unset.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (e.g. openssl rand -hex 32)}
      PORT: "8080"
      APP__DATABASE__AUTO_MIGRATE: "true"
      # Lock this down to your real frontend origin(s) in production.
      APP__SERVER__CORS_ORIGINS: ${CORS_ORIGINS:-*}
      APP__STORAGE__BACKUP_DIR: "/app/backups"
      RUST_LOG: ${RUST_LOG:-info,rsmc_engine=debug}
    ports:
      - "8080:8080"
    volumes:
      # Host directories for persistent data, set once in .env. Defaults put
      # them in browsable folders next to this file. The container writes as
      # UID 10001, so the chosen host dirs must be writable by that UID
      # (see README — a one-time `chown 10001:10001` or `chmod 777`).
      - ${UPLOAD_HOST_DIR:-./uploads}:/app/uploads
      - ${BACKUP_HOST_DIR:-./backups}:/app/backups

volumes:
  pgdata:
  redisdata:
